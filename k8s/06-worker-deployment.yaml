# Worker tier: drains the Redis queue. Scaled INDEPENDENTLY of the API because
# its bottleneck is model throughput, not HTTP concurrency. No ports / probes
# needed (not serving HTTP); k8s restarts it if the process exits.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-worker
  namespace: llm-engine
  labels:
    app: llm-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: llm-worker
  template:
    metadata:
      labels:
        app: llm-worker
    spec:
      containers:
        - name: worker
          image: your-org/llm-engine:0.1.0
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "app.worker"]
          envFrom:
            - configMapRef:
                name: llm-engine-config
            - secretRef:
                name: llm-engine-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
