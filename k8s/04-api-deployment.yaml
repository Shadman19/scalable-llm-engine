# API tier: stateless, horizontally scalable. Reads config from ConfigMap and
# the API key from a Secret. Probes let k8s restart unhealthy pods and keep
# traffic off pods that cannot reach Redis.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-api
  namespace: llm-engine
  labels:
    app: llm-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: llm-api
  template:
    metadata:
      labels:
        app: llm-api
    spec:
      containers:
        - name: api
          # Replace with your registry path, e.g. ghcr.io/<you>/llm-engine:0.1.0
          image: your-org/llm-engine:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: llm-engine-config
            - secretRef:
                name: llm-engine-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
