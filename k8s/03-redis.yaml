# Single-replica Redis for the MVP. For production move to a managed Redis
# (AWS ElastiCache / GCP Memorystore) or a Redis Operator with persistence +
# HA — a single pod is a data-loss / single-point-of-failure risk for the queue.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: llm-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: llm-engine
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
