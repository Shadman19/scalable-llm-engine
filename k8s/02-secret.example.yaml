# Copy to 02-secret.yaml and fill in the real key (02-secret.yaml is gitignored).
# Better: use an external secret manager (AWS Secrets Manager + External Secrets
# Operator, or Sealed Secrets) instead of committing this at all.
#
# Create directly from CLI without a file:
#   kubectl -n llm-engine create secret generic llm-engine-secrets \
#     --from-literal=MINIMAX_API_KEY=your_real_key
apiVersion: v1
kind: Secret
metadata:
  name: llm-engine-secrets
  namespace: llm-engine
type: Opaque
stringData:
  MINIMAX_API_KEY: "REPLACE_WITH_REAL_KEY"
