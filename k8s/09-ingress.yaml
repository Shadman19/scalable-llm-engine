# Exposes the API outside the cluster. Assumes an ingress controller (nginx)
# and cert-manager for TLS. Adjust host + class to your environment.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: llm-api-ingress
  namespace: llm-engine
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - llm.internal.example.com
      secretName: llm-api-tls
  rules:
    - host: llm.internal.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: llm-api
                port:
                  number: 80
