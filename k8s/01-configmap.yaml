apiVersion: v1
kind: ConfigMap
metadata:
  name: llm-engine-config
  namespace: llm-engine
data:
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  MINIMAX_BASE_URL: "https://api.minimax.io/v1"
  MINIMAX_DEFAULT_MODEL: "MiniMax-M2.5"
  REDIS_URL: "redis://redis:6379/0"
  CACHE_ENABLED: "true"
  CACHE_TTL_SECONDS: "3600"
